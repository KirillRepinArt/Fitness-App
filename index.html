  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #0a0a0c;
      font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: #f5f3ef;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; }
    /* App container fills the viewport with subtle dot grid */
    .stage {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,214,10,0.04), transparent 60%),
        radial-gradient(circle at 80% 100%, rgba(230,57,70,0.06), transparent 60%),
        #0a0a0c;
    }
    .stage::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      mask: radial-gradient(circle at 50% 50%, black 30%, transparent 75%);
      -webkit-mask: radial-gradient(circle at 50% 50%, black 30%, transparent 75%);
    }
    #root { position: relative; z-index: 1; }
  </style>

</head>
